{% extends "layout.html" %}

{% block title %}历史记录 - 乳腺癌超声诊断系统{% endblock %}

{% block content %}
<div class="history-page">
    <h2 class="section-title">诊断历史记录</h2>

    <!-- 统计卡片 -->
    <div id="statsContainer" class="stats-grid">
        <div class="stat-card"><span class="stat-value" id="statTotal">-</span><span class="stat-label">总次数</span></div>
        <div class="stat-card benign"><span class="stat-value" id="statBenign">-</span><span class="stat-label">良性</span></div>
        <div class="stat-card malignant"><span class="stat-value" id="statMalignant">-</span><span class="stat-label">恶性</span></div>
        <div class="stat-card normal"><span class="stat-value" id="statNormal">-</span><span class="stat-label">正常</span></div>
    </div>

    <!-- 工具栏 -->
    <div class="history-toolbar">
        <button class="btn-action" onclick="loadHistory()">&#8635; 刷新</button>
        <button class="btn-danger" onclick="confirmClearAll()">&#128465; 清空全部</button>
        <a href="/" class="btn-back">&larr; 返回诊断</a>
    </div>

    <!-- 列表 -->
    <div class="history-list" id="historyList">
        <p class="loading-text">加载中...</p>
    </div>

    <!-- 分页 -->
    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)" disabled>上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextBtn" onclick="changePage(1)">下一页</button>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.history-page { max-width: 1000px; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
    background: white; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 20px 12px; text-align: center;
}
.stat-value { display: block; font-size: 1.75rem; font-weight: 800; color: var(--text-secondary); }
.stat-label { font-size: .82rem; color: var(--text-muted); margin-top: 4px; }
.stat-card.benign .stat-value { color: var(--benign); }
.stat-card.malignant .stat-value { color: var(--malignant); }
.stat-card.normal .stat-value { color: var(--normal); }

.history-toolbar {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;
}
.btn-action {
    background: white; color: var(--primary); border: 1.5px solid var(--border);
    padding: 7px 18px; border-radius: 999px; cursor: pointer; font-size: .88rem;
    font-weight: 500; transition: .2s;
}
.btn-action:hover { background: var(--primary-bg); border-color: var(--primary); }
.btn-danger {
    background: var(--malignant-bg); color: var(--malignant);
    border: 1.5px solid #fecaca; padding: 7px 18px; border-radius: 999px;
    cursor: pointer; font-size: .88rem; font-weight: 500; transition: .2s;
}
.btn-danger:hover { background: var(--malignant); color: white; }
.btn-back {
    background: transparent; color: var(--text-secondary); text-decoration: none;
    padding: 7px 16px; font-size: .88rem; margin-left: auto;
    transition: .2s;
}
.btn-back:hover { color: var(--primary); }

.history-item {
    display: flex; align-items: center; gap: 14px;
    background: white; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 16px 20px; margin-bottom: 10px; transition: box-shadow .2s;
}
.history-item:hover { box-shadow: var(--shadow); }

.class-badge {
    width: 48px; height: 48px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; font-weight: 700;
    font-size: .72rem; color: white; text-align: center; line-height: 1.25;
    flex-shrink: 0;
}
.class-badge.benign { background: linear-gradient(135deg,#06b6d4,var(--benign)); }
.class-badge.malignant { background: linear-gradient(135deg,#ef4444,var(--malignant)); }
.class-badge.normal { background: linear-gradient(135deg,#34d399,var(--normal)); }

.history-info { flex: 1; min-width: 0; }
.history-filename { font-weight: 600; color: var(--text); font-size: .92rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-meta { font-size: .8rem; color: var(--text-muted); margin-top: 3px; }
.history-conf { text-align: right; min-width: 80px; flex-shrink: 0; }
.history-conf-value { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
.history-time { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
.delete-btn {
    background: none; border: none; color: #cbd5e1; cursor: pointer;
    font-size: 1.15rem; padding: 6px 8px; border-radius: 8px; line-height: 1;
    transition: .2s; flex-shrink: 0;
}
.delete-btn:hover { color: var(--malignant); background: var(--malignant-bg); }

.pagination { display: flex; justify-content: center; align-items: center; gap: 12px; margin: 28px 0 0; }
.pagination button {
    padding: 8px 22px; border: 1px solid var(--border); background: white;
    border-radius: 999px; cursor: pointer; font-size: .87rem; font-weight: 500;
    color: var(--text-secondary); transition: .2s;
}
.pagination button:not(:disabled):hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }
.pagination button:disabled { opacity: .35; cursor: not-allowed; }

.loading-text { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: .92rem; }

@media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .history-item { flex-wrap: wrap; gap: 10px; }
    .history-conf { min-width: auto; }
    .btn-back { margin-left: 0; }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 0;
const PAGE_SIZE = 20;

function loadStats() {
    fetch('/api/history/stats').then(r => r.json()).then(d => {
        if (!d.success) return;
        const s = d.stats;
        document.getElementById('statTotal').textContent = s.total || 0;
        document.getElementById('statBenign').textContent = (s.class_distribution || {}).benign || 0;
        document.getElementById('statMalignant').textContent = (s.class_distribution || {}).malignant || 0;
        document.getElementById('statNormal').textContent = (s.class_distribution || {}).normal || 0;
    });
}

function loadHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '<p class="loading-text">加载中...</p>';
    fetch(`/api/history?limit=${PAGE_SIZE}&offset=${currentPage * PAGE_SIZE}`)
        .then(r => r.json())
        .then(d => {
            if (!d.success || !d.records.length) {
                list.innerHTML = '<p style="text-align:center;color:#cbd5e1;padding:48px;">暂无记录</p>';
                document.getElementById('nextBtn').disabled = true;
                return;
            }
            list.innerHTML = d.records.map(r => `
                <div class="history-item">
                    <div class="class-badge ${r.predicted_class}">${r.predicted_class_cn}</div>
                    <div class="history-info">
                        <div class="history-filename">${r.filename || '未命名'}</div>
                        <div class="history-meta">${r.image_size || ''} ${r.use_tta ? '| TTA增强' : ''} ${r.inference_time_ms ? '| '+r.inference_time_ms+'ms' : ''}</div>
                    </div>
                    <div class="history-conf">
                        <div class="history-conf-value">${(r.confidence * 100).toFixed(1)}%</div>
                        <div class="history-time">${formatTime(r.created_at)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteRecord(${r.id})">&times;</button>
                </div>
            `).join('');
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = d.records.length < PAGE_SIZE;
            document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} 页`;
        });
}

function changePage(delta) { currentPage += delta; loadHistory(); }

function deleteRecord(id) {
    if (!confirm('确定删除这条记录？')) return;
    fetch(`/api/history/${id}`, { method: 'DELETE' }).then(() => { loadHistory(); loadStats(); });
}

function confirmClearAll() {
    if (!confirm('确定清空所有历史记录？此操作不可撤销！')) return;
    fetch('/api/history/clear', { method: 'DELETE' })
        .then(r => r.json()).then(d => { alert(`已删除 ${d.deleted} 条记录`); loadHistory(); loadStats(); });
}

function formatTime(s) {
    if (!s) return '';
    try { return s.replace('T', ' ').slice(0, 16); } catch(e) { return s; }
}

loadStats();
loadHistory();
</script>
{% endblock %}
